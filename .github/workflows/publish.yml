name: Publish to npm

on:
  release:
    types: [created]  # 当创建 GitHub Release 时触发
  # 或者你也可以选择手动触发
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write  # 用于 OIDC 认证（可选）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'  # npm 官方 registry

      - name: Install dependencies
        run: npm ci  # 比 npm install 更严格，适合 CI

      - name: Run tests
        run: npm test  # 发布前确保测试通过

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}  # 使用刚才配置的 token
